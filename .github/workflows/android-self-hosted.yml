name: Android Self Hosted

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-self-hosted.yml"

jobs:
  build-android:
    runs-on: [self-hosted, linux, x64, android-do]
    defaults:
      run:
        shell: bash
    env:
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android signing files
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p apps/mobile/android/app apps/mobile/android/fastlane
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/app/release.keystore
          echo "${{ secrets.PLAY_STORE_JSON_KEY_BASE64 }}" | base64 -d > apps/mobile/android/fastlane/play-store-key.json

      - name: Build release AAB
        env:
          ANDROID_KEYSTORE_PATH: app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd apps/mobile/android
          ./gradlew bundleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: apps/mobile/android/app/build/outputs/**/*.aab

      - name: Fastlane deploy
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPPLY_JSON_KEY: ${{ github.workspace }}/apps/mobile/android/fastlane/play-store-key.json
          ANDROID_APPLICATION_ID: com.owaisrazaqadri
          PLAY_TRACK: internal
          ANDROID_KEYSTORE_PATH: app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd apps/mobile/android
          bundle install
          fastlane android deploy
