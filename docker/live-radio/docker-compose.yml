services:
  live-radio:
    build: .
    container_name: live-radio
    restart: unless-stopped
    ports:
      - "8000:8000"  # Icecast
      - "8080:3000"  # API Server
    environment:
      - APPWRITE_ENDPOINT=https://sgp.cloud.appwrite.io/v1
      - APPWRITE_PROJECT_ID=695bb97700213f4ef5dd
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - DATABASE_ID=695bc8e70038db72df5b
    volumes:
      - ./audio-cache:/app/audio-cache
      - ./logs:/var/log/icecast
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s