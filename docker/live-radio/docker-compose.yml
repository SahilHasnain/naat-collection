version: '3.8'

services:
  live-radio:
    build: .
    ports:
      - "8080:3000"    # Node.js API
      - "8000:8000"    # Icecast stream
    volumes:
      - ./audio-cache:/app/audio-cache
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY}
      - DATABASE_ID=${DATABASE_ID}
      - APPWRITE_NAATS_COLLECTION_ID=${APPWRITE_NAATS_COLLECTION_ID}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3