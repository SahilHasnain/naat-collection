events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=10r/s;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.apple.mpegurl;

    # Upstream definitions
    upstream icecast_stream {
        server live-radio:8000;
    }
    
    upstream api_server {
        server live-radio:3000;
    }

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name owaisrazaqadri.duckdns.org;
        
        # Allow Let's Encrypt challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name owaisrazaqadri.duckdns.org;

        # SSL certificates (will be generated by Certbot)
        ssl_certificate /etc/letsencrypt/live/owaisrazaqadri.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/owaisrazaqadri.duckdns.org/privkey.pem;
        
        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # CORS headers for HLS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

        # Live radio stream (Icecast)
        location /live {
            limit_req zone=stream_limit burst=20 nodelay;
            
            proxy_pass http://icecast_stream/live;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Streaming optimizations for Icecast
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            # Cache control
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            
            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, X-Requested-With, Content-Type, Range" always;
            
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;
                add_header Access-Control-Allow-Headers "Origin, Accept, X-Requested-With, Content-Type, Range" always;
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
        }

        # Proxy API requests to Node.js
        location /api/ {
            limit_req zone=stream_limit burst=20 nodelay;
            
            proxy_pass http://api_server/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
